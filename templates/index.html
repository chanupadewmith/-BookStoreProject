<!-- templates/index.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Book Store System</title>
    <style>
        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:30px;
        }

        h1{
            text-align:center;
            color:#333;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            width:80%;
            margin:auto;
            box-shadow:0 0 10px gray;
        }

        input{
            padding:8px;
            margin:5px;
        }

        button{
            padding:8px 15px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        table,th,td{
            border:1px solid gray;
            padding:10px;
            text-align:center;
        }

        a{
            color:red;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="box">

<h1>Book Store Management</h1>

<form action="/add" method="POST">
    <input type="number" name="bookid" placeholder="Book ID" required>
    <input type="text" name="title" placeholder="Title" required>
    <input type="text" name="author" placeholder="Author" required>
    <input type="text" name="price" placeholder="Price" required>
    <button type="submit">Add Book</button>
</form>

<table>
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Price</th>
    <th>Delete</th>
</tr>

{% for book in books %}
<tr>
    <td>{{book.BookID}}</td>
    <td>{{book.Title}}</td>
    <td>{{book.Author}}</td>
    <td>{{book.Price}}</td>
    <td>
        <a href="/delete/{{book.BookID}}">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
